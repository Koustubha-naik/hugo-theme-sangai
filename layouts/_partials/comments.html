<!-- Check if the individual markdown post has "comments = true" in its front matter -->
{{ if and .Site.Params.giscus.repo (eq .Params.comments true) }}
<div class="giscus-wrapper single-container" style="margin-top: 4rem;">
  <hr class="single-divider">
  <script src="https://giscus.app/client.js"
          data-repo="{{ .Site.Params.giscus.repo }}"
          data-repo-id="{{ .Site.Params.giscus.repoId }}"
          data-category="{{ .Site.Params.giscus.category }}"
          data-category-id="{{ .Site.Params.giscus.categoryId }}"
          data-mapping="{{ .Site.Params.giscus.mapping }}"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="bottom"
          data-theme="https://cdn.jsdelivr.net/gh/Koustubha-naik/hugo-theme-sangai@main/assets/css/giscus-custom.css"
          data-lang="en"
          data-loading="lazy"
          crossorigin="anonymous"
          async>
  </script>
</div>
{{ end }}
